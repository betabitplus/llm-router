name: Issue 246 Apply Canonical API Boundary

on:
  pull_request:
    branches: [dev]
    types: [opened, reopened, synchronize]

permissions:
  contents: read

jobs:
  apply:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'issue-246-standard-onboarding'
    runs-on: ubuntu-latest
    steps:
      - name: Create target write token
        id: target-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.PY_LIB_AUTOMATION_CLIENT_ID }}
          private-key: ${{ secrets.PY_LIB_AUTOMATION_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: llm-router
          permission-contents: write

      - name: Create shared read token
        id: shared-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.PY_LIB_AUTOMATION_CLIENT_ID }}
          private-key: ${{ secrets.PY_LIB_AUTOMATION_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            llm-router
            py-lib-starter
          permission-contents: read

      - uses: actions/checkout@v6
        with:
          ref: issue-246-standard-onboarding
          fetch-depth: 0
          persist-credentials: false

      - name: Detect explicit apply commit
        id: gate
        shell: bash
        run: |
          if [ "$(git log -1 --pretty=%s)" = 'ci: apply canonical Issue 246 API boundary' ]; then
            echo 'apply=true' >> "$GITHUB_OUTPUT"
          else
            echo 'apply=false' >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v6
        if: steps.gate.outputs.apply == 'true'
        with:
          python-version: '3.13'

      - uses: astral-sh/setup-uv@v8.2.0
        if: steps.gate.outputs.apply == 'true'
        with:
          enable-cache: auto

      - name: Install exact development environment
        if: steps.gate.outputs.apply == 'true'
        env:
          SHARED_PACKAGE_TOKEN: ${{ steps.shared-token.outputs.token }}
        shell: bash
        run: |
          set -euo pipefail
          auth_header="$(printf 'x-access-token:%s' "$SHARED_PACKAGE_TOKEN" | base64 | tr -d '\n')"
          printf '::add-mask::%s\n' "$auth_header"
          git config --global http.https://github.com/.extraheader "AUTHORIZATION: basic ${auth_header}"
          bash scripts/env/setup.sh

      - name: Restore canonical declaration ownership
        if: steps.gate.outputs.apply == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations

          import re
          import shutil
          import subprocess
          from pathlib import Path

          root = Path.cwd()
          base = "88dd6f4650932440560caac0fabfb90e3430d320"

          def show(path: str) -> str:
              return subprocess.check_output(
                  ["git", "show", f"{base}:{path}"], text=True
              )

          old_types = show("src/llm_router/_api/types.py")
          old_contracts = show("src/llm_router/_api/contracts.py")
          type_body = old_types[old_types.index("class Provider") :].rstrip()
          contract_body = old_contracts[
              old_contracts.index(
                  "# =============================================================================\n"
                  "# Input / upload schemas"
              ) :
          ]
          image_start = contract_body.index(
              "def _validate_image(image: Image.Image) -> Image.Image:"
          )
          image_end = contract_body.index(
              "\n\n# `ImageSchema` is a validated Pillow image object.",
              image_start,
          )
          contract_body = contract_body[:image_start] + contract_body[image_end + 2 :]
          contract_body = contract_body.replace(
              "_validate_is_file(", "_PathValidator.validate("
          ).replace(
              "_as_explicit_kwargs(", "_ExplicitKwargsBuilder.build("
          ).replace(
              "AfterValidator(_validate_image)",
              "AfterValidator(_ImageValidator.validate)",
          )
          header = '''"""Public vocabulary and data contracts for `llm_router`.

          This declaration module owns all caller-facing enums, aliases, request DTOs,
          response DTOs, routing profiles, and trace shapes shared with private runtime
          code.
          """

          from __future__ import annotations

          from collections.abc import Callable, Mapping, Sequence
          from dataclasses import dataclass, field
          from enum import StrEnum
          from pathlib import Path
          from typing import Annotated, Any, Literal
          from urllib.parse import urlparse

          from PIL import Image
          from pydantic import (
              AfterValidator,
              BaseModel,
              ConfigDict,
              Field,
              field_validator,
          )


          class _PathValidator:
              """Validate local paths used by public file and video DTOs."""

              @staticmethod
              def validate(path: str, *, error_template: str) -> str:
                  """Return a normalized existing file path."""
                  file_path = Path(path)
                  if not file_path.is_file():
                      msg = error_template.format(path=path)
                      raise ValueError(msg)
                  return str(file_path)


          class _ExplicitKwargsBuilder:
              """Build defensive copies of explicitly configured DTO fields."""

              @staticmethod
              def build(
                  *items: tuple[str, Any],
                  copied_mappings: Mapping[str, Mapping[Any, Any]] | None = None,
              ) -> dict[str, Any]:
                  """Return only explicitly configured non-null values."""
                  data = {key: value for key, value in items if value is not None}
                  if copied_mappings is not None:
                      for key, value in copied_mappings.items():
                          data[key] = dict(value)
                  return data


          class _ImageValidator:
              """Validate public in-memory image inputs."""

              @staticmethod
              def validate(image: Image.Image) -> Image.Image:
                  """Return an image with supported dimensions and mode."""
                  if image.width <= 0 or image.height <= 0:
                      msg = (
                          "Image must have positive dimensions, "
                          f"got {image.width}x{image.height}."
                      )
                      raise ValueError(msg)
                  allowed_modes = {"RGB", "RGBA", "L", "LA", "P", "PA"}
                  if image.mode not in allowed_modes:
                      msg = (
                          f"Image mode {image.mode!r} is not supported. "
                          f"Allowed: {sorted(allowed_modes)}."
                      )
                      raise ValueError(msg)
                  min_dim = 10
                  max_dim = 16384
                  if image.width < min_dim or image.height < min_dim:
                      msg = (
                          f"Image dimensions {image.width}x{image.height} are too small "
                          f"(min {min_dim}x{min_dim})."
                      )
                      raise ValueError(msg)
                  if image.width > max_dim or image.height > max_dim:
                      msg = (
                          f"Image dimensions {image.width}x{image.height} are too large "
                          f"(max {max_dim}x{max_dim})."
                      )
                      raise ValueError(msg)
                  return image
          '''
          header = re.sub(r"(?m)^          ", "", header)
          api = root / "src/llm_router/_api"
          internal = root / "src/llm_router/_internal"
          api.joinpath("types.py").write_text(
              f"{header.rstrip()}\n\n\n{type_body}\n\n\n{contract_body.rstrip()}\n",
              encoding="utf-8",
          )
          api.joinpath("errors.py").write_text(
              show("src/llm_router/_api/errors.py"), encoding="utf-8"
          )
          defaults = show("src/llm_router/_api/defaults.py").replace(
              "from llm_router._api.contracts import ProviderLimits\n"
              "from llm_router._api.types import Model, Provider\n",
              "from llm_router._api.types import Model, Provider, ProviderLimits\n",
          )
          api.joinpath("defaults.py").write_text(defaults, encoding="utf-8")
          api.joinpath("contracts.py").unlink()

          replacements = {
              "from llm_router._internal.contracts.models import": "from llm_router._api.types import",
              "from llm_router._internal.contracts.types import": "from llm_router._api.types import",
              "from llm_router._internal.contracts.errors import": "from llm_router._api.errors import",
              "from llm_router._api.contracts import": "from llm_router._api.types import",
          }
          for path in sorted(root.joinpath("src/llm_router").rglob("*.py")):
              text = path.read_text(encoding="utf-8")
              updated = text
              for old, new in replacements.items():
                  updated = updated.replace(old, new)
              if updated != text:
                  path.write_text(updated, encoding="utf-8")

          internal.joinpath("config/assembly.py").write_text(
              show("src/llm_router/_internal/config/assembly.py"), encoding="utf-8"
          )
          internal.joinpath("config/defaults.py").unlink()
          shutil.rmtree(internal / "contracts")
          internal.joinpath("__init__.py").write_text(
              '''"""Private implementation root for `llm_router`."""

          from __future__ import annotations

          from llm_router._internal.config import (
              BehaviorDefaults as BehaviorDefaults,
              LLMRouterConfig as LLMRouterConfig,
              ProviderCatalog as ProviderCatalog,
              ProviderSpec as ProviderSpec,
              RetryPolicy as RetryPolicy,
              RouterPolicyDefaults as RouterPolicyDefaults,
              get_config as get_config,
              install_config as install_config,
          )
          from llm_router._internal.providers.registry import (
              clear_adapter_caches as clear_adapter_caches,
          )
          from llm_router._internal.runtime import RouterRuntime as RouterRuntime
          from llm_router._internal.session import SessionStore as SessionStore
          '''.replace("          ", ""),
              encoding="utf-8",
          )

          def explicit_exports(path: Path) -> None:
              text = path.read_text(encoding="utf-8")
              lines = text.splitlines()
              output: list[str] = []
              multiline = False
              for line in lines:
                  stripped = line.strip()
                  if line.startswith("from ") and stripped.endswith(" import ("):
                      multiline = True
                      output.append(line)
                      continue
                  if multiline and stripped == ")":
                      multiline = False
                      output.append(line)
                      continue
                  if multiline:
                      match = re.fullmatch(r"(\s*)([A-Za-z_][A-Za-z0-9_]*)(,?)", line)
                      if match:
                          indent, name, comma = match.groups()
                          output.append(f"{indent}{name} as {name}{comma}")
                          continue
                  match = re.fullmatch(
                      r"from (.+) import ([A-Za-z_][A-Za-z0-9_]*)", stripped
                  )
                  if match:
                      module, name = match.groups()
                      output.append(f"from {module} import {name} as {name}")
                  else:
                      output.append(line)
              path.write_text("\n".join(output).rstrip() + "\n", encoding="utf-8")

          for relative in (
              "config/__init__.py",
              "capabilities/__init__.py",
              "runtime/__init__.py",
              "session/__init__.py",
          ):
              explicit_exports(internal / relative)

          root.joinpath("tests/llm_router/unit/test_internal_root_exports.py").write_text(
              '''"""Private-root boundary regression tests."""

          from __future__ import annotations

          import llm_router._internal as internal


          def test_internal_root_uses_explicit_facade_without_public_all() -> None:
              """Keep private entrypoints narrow without presenting public API."""
              assert not hasattr(internal, "__all__")
              expected = {
                  "BehaviorDefaults",
                  "LLMRouterConfig",
                  "ProviderCatalog",
                  "ProviderSpec",
                  "RetryPolicy",
                  "RouterPolicyDefaults",
                  "RouterRuntime",
                  "SessionStore",
                  "clear_adapter_caches",
                  "get_config",
                  "install_config",
              }
              assert expected <= set(vars(internal))


          def test_internal_root_does_not_export_provider_adapters() -> None:
              """Do not leak concrete provider adapters through the root."""
              forbidden = {
                  "AIStudioAdapter",
                  "GeminiWebApiAdapter",
                  "GoogleGenAIAdapter",
                  "OpenAICompatibleAdapter",
                  "QwenChatAdapter",
              }
              assert forbidden.isdisjoint(vars(internal))
          '''.replace("          ", ""),
              encoding="utf-8",
          )
          PY

      - name: Format and validate canonical boundary
        if: steps.gate.outputs.apply == 'true'
        shell: bash
        run: |
          set -euo pipefail
          uv run ruff check --fix src tests
          uv run ruff format src tests
          python -m compileall -q src tests
          find . -type d -name __pycache__ -prune -exec rm -rf {} +
          uv run py-lib-check-project-structure --strict-template
          uv run py-lib-check-project-docs-structure
          uv run py-lib-check-public-contract-boundary
          uv run pytest tests/llm_router/unit tests/llm_router/integration tests/llm_router/property_based -n auto -p randomly -m 'not slow' -q --no-cov
          git diff --check

      - name: Commit and push canonical boundary
        if: steps.gate.outputs.apply == 'true'
        env:
          TARGET_TOKEN: ${{ steps.target-token.outputs.token }}
        shell: bash
        run: |
          set -euo pipefail
          git add src tests
          git config user.name 'betabitplus-py-lib-automation[bot]'
          git config user.email '297150264+betabitplus-py-lib-automation[bot]@users.noreply.github.com'
          git commit -m 'refactor: restore canonical public declarations'
          git config --global --unset-all http.https://github.com/.extraheader || true
          write_header="$(printf 'x-access-token:%s' "$TARGET_TOKEN" | base64 | tr -d '\n')"
          printf '::add-mask::%s\n' "$write_header"
          git -c http.https://github.com/.extraheader="AUTHORIZATION: basic ${write_header}" \
            push origin HEAD:issue-246-standard-onboarding
