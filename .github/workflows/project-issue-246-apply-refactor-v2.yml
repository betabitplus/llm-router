name: Issue 246 Focused Diagnostics

on:
  pull_request:
    branches: [dev]
    types: [opened, reopened, synchronize]

permissions:
  contents: read

jobs:
  diagnose:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'issue-246-standard-onboarding'
    runs-on: ubuntu-latest
    steps:
      - name: Create shared package token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.PY_LIB_AUTOMATION_CLIENT_ID }}
          private-key: ${{ secrets.PY_LIB_AUTOMATION_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            llm-router
            py-lib-starter
          permission-contents: read

      - uses: actions/checkout@v6
        with:
          ref: issue-246-standard-onboarding
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: auto

      - name: Install dependencies
        env:
          SHARED_PACKAGE_TOKEN: ${{ steps.app-token.outputs.token }}
        shell: bash
        run: |
          set -euo pipefail
          auth_header="$(printf 'x-access-token:%s' "$SHARED_PACKAGE_TOKEN" | base64 | tr -d '\n')"
          printf '::add-mask::%s\n' "$auth_header"
          git config --global http.https://github.com/.extraheader "AUTHORIZATION: basic ${auth_header}"
          sudo apt-get update
          sudo apt-get install -y shellcheck
          sudo curl -fsSL -o /usr/local/bin/hadolint \
            https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64
          sudo chmod +x /usr/local/bin/hadolint
          bash scripts/env/setup.sh

      - name: Run focused checks
        id: checks
        shell: bash
        run: |
          set -uo pipefail
          out=issue246-diagnostics
          mkdir -p "$out"
          failed=0
          check() {
            local name="$1"; shift
            set +e
            "$@" >"$out/${name}.log" 2>&1
            rc=$?
            set -e
            printf '%s=%s\n' "$name" "$rc" >>"$out/statuses.txt"
            if [ "$rc" -ne 0 ]; then failed=1; fi
          }
          check template uv run py-lib-template-check
          check structure uv run py-lib-check-project-structure --strict-template
          check docs uv run py-lib-check-project-docs-structure
          check public-contract uv run py-lib-check-public-contract-boundary
          export SKIP=check-branch-name,no-push-to-main,uv-sync-post-merge,uv-sync-post-checkout
          check pre-commit uv run pre-commit run --all-files --show-diff-on-failure
          check pre-push uv run pre-commit run --all-files --hook-stage pre-push --show-diff-on-failure
          check tests uv run pytest tests/llm_router/unit tests/llm_router/integration tests/llm_router/property_based -n auto -p randomly -m 'not slow' -q --no-cov
          cat "$out/statuses.txt"
          echo "failed=$failed" >>"$GITHUB_OUTPUT"
          exit 0

      - name: Upload focused diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-246-focused-${{ github.run_id }}
          path: issue246-diagnostics
          if-no-files-found: error
          retention-days: 14

      - name: Assert checks
        if: always()
        run: test '${{ steps.checks.outputs.failed }}' = '0'
