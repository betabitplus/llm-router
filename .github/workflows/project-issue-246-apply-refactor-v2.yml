name: Issue 246 Apply Stable Template Update

on:
  pull_request:
    branches:
      - dev
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: read

jobs:
  update:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'issue-246-standard-onboarding'
    runs-on: ubuntu-latest
    steps:
      - name: Create target write token
        id: target-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.PY_LIB_AUTOMATION_CLIENT_ID }}
          private-key: ${{ secrets.PY_LIB_AUTOMATION_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: llm-router
          permission-contents: write

      - name: Create shared read token
        id: shared-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.PY_LIB_AUTOMATION_CLIENT_ID }}
          private-key: ${{ secrets.PY_LIB_AUTOMATION_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            llm-router
            py-lib-starter
          permission-contents: read

      - name: Check out migration branch
        uses: actions/checkout@v6
        with:
          ref: issue-246-standard-onboarding
          fetch-depth: 0
          persist-credentials: false

      - name: Detect explicit update request
        id: gate
        shell: bash
        run: |
          subject="$(git log -1 --pretty=%s)"
          if [ "$subject" = 'ci: atomically apply Issue 246 template v0.29.3' ]; then
            echo 'apply=true' >> "$GITHUB_OUTPUT"
          else
            echo 'apply=false' >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.gate.outputs.apply == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Set up uv
        if: steps.gate.outputs.apply == 'true'
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: auto

      - name: Install current development environment
        if: steps.gate.outputs.apply == 'true'
        env:
          SHARED_PACKAGE_TOKEN: ${{ steps.shared-token.outputs.token }}
        shell: bash
        run: |
          set -euo pipefail
          auth_header="$(printf 'x-access-token:%s' "$SHARED_PACKAGE_TOKEN" | base64 | tr -d '\n')"
          printf '::add-mask::%s\n' "$auth_header"
          GIT_CONFIG_COUNT=1 \
          GIT_CONFIG_KEY_0=http.https://github.com/.extraheader \
          GIT_CONFIG_VALUE_0="AUTHORIZATION: basic ${auth_header}" \
            uv sync --group dev --frozen --python "$(command -v python)"

      - name: Apply official Copier update to v0.29.3
        if: steps.gate.outputs.apply == 'true'
        env:
          SHARED_PACKAGE_TOKEN: ${{ steps.shared-token.outputs.token }}
        shell: bash
        run: |
          set -euo pipefail
          auth_header="$(printf 'x-access-token:%s' "$SHARED_PACKAGE_TOKEN" | base64 | tr -d '\n')"
          printf '::add-mask::%s\n' "$auth_header"
          GIT_CONFIG_COUNT=1 \
          GIT_CONFIG_KEY_0=http.https://github.com/.extraheader \
          GIT_CONFIG_VALUE_0="AUTHORIZATION: basic ${auth_header}" \
            uv run py-lib-template-update --vcs-ref v0.29.3

      - name: Verify exact stable update result
        if: steps.gate.outputs.apply == 'true'
        shell: bash
        run: |
          set -euo pipefail
          grep -Eq '^_commit: v0\.29\.3$' _copier_answers.yml
          grep -q 'py-lib-starter.git@v0.29.3#subdirectory=packages/py-lib-runtime' pyproject.toml
          grep -q 'py-lib-starter.git@v0.29.3#subdirectory=packages/py-lib-tooling' pyproject.toml
          uv lock --check
          git diff --check
          actual="$(git diff --name-only | sort)"
          expected="$(printf '%s\n' \
            '.github/workflows/ci.yml' \
            '.github/workflows/sync-starter-template.yml' \
            '_copier_answers.yml' \
            'pyproject.toml' \
            'uv.lock' | sort)"
          test "$actual" = "$expected"

      - name: Create one atomic Git commit through the App
        if: steps.gate.outputs.apply == 'true'
        env:
          GH_TOKEN: ${{ steps.target-token.outputs.token }}
        shell: bash
        run: |
          set -euo pipefail
          parent_sha="$(git rev-parse HEAD)"
          base_tree="$(git rev-parse HEAD^{tree})"
          create_blob() {
            jq -Rs '{content: ., encoding: "utf-8"}' "$1" |
              gh api --method POST \
                "repos/${GITHUB_REPOSITORY}/git/blobs" \
                --input - --jq '.sha'
          }
          ci_sha="$(create_blob .github/workflows/ci.yml)"
          sync_sha="$(create_blob .github/workflows/sync-starter-template.yml)"
          answers_sha="$(create_blob _copier_answers.yml)"
          pyproject_sha="$(create_blob pyproject.toml)"
          lock_sha="$(create_blob uv.lock)"
          tree_sha="$(jq -n \
            --arg base_tree "$base_tree" \
            --arg ci_sha "$ci_sha" \
            --arg sync_sha "$sync_sha" \
            --arg answers_sha "$answers_sha" \
            --arg pyproject_sha "$pyproject_sha" \
            --arg lock_sha "$lock_sha" \
            '{base_tree: $base_tree, tree: [
              {path: ".github/workflows/ci.yml", mode: "100644", type: "blob", sha: $ci_sha},
              {path: ".github/workflows/sync-starter-template.yml", mode: "100644", type: "blob", sha: $sync_sha},
              {path: "_copier_answers.yml", mode: "100644", type: "blob", sha: $answers_sha},
              {path: "pyproject.toml", mode: "100644", type: "blob", sha: $pyproject_sha},
              {path: "uv.lock", mode: "100644", type: "blob", sha: $lock_sha}
            ]}' |
            gh api --method POST \
              "repos/${GITHUB_REPOSITORY}/git/trees" \
              --input - --jq '.sha')"
          commit_sha="$(jq -n \
            --arg message 'chore: update managed shell to starter v0.29.3' \
            --arg tree "$tree_sha" \
            --arg parent "$parent_sha" \
            '{message: $message, tree: $tree, parents: [$parent]}' |
            gh api --method POST \
              "repos/${GITHUB_REPOSITORY}/git/commits" \
              --input - --jq '.sha')"
          jq -n --arg sha "$commit_sha" '{sha: $sha, force: false}' |
            gh api --method PATCH \
              "repos/${GITHUB_REPOSITORY}/git/refs/heads/issue-246-standard-onboarding" \
              --input - >/dev/null
