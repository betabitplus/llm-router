name: Issue 246 Export Current Branch

on:
  pull_request:
    branches:
      - dev
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: read

jobs:
  export:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'issue-246-standard-onboarding'
    runs-on: ubuntu-latest
    steps:
      - name: Check out migration branch
        uses: actions/checkout@v6
        with:
          ref: issue-246-standard-onboarding
          fetch-depth: 0

      - name: Detect explicit export commit
        id: gate
        shell: bash
        run: |
          subject="$(git log -1 --pretty=%s)"
          if [ "$subject" = 'ci: export Issue 246 current branch' ]; then
            echo 'export=true' >> "$GITHUB_OUTPUT"
          else
            echo 'export=false' >> "$GITHUB_OUTPUT"
          fi

      - name: Build current branch evidence
        if: steps.gate.outputs.export == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/issue-246-current"
          git bundle create "$RUNNER_TEMP/issue-246-current/llm-router-current.bundle" --all
          tar --exclude=.git -czf \
            "$RUNNER_TEMP/issue-246-current/llm-router-current-source.tar.gz" \
            .
          (
            cd "$RUNNER_TEMP/issue-246-current"
            sha256sum llm-router-current.bundle llm-router-current-source.tar.gz > SHA256SUMS
            sha256sum --check SHA256SUMS
          )

      - name: Upload current branch evidence
        if: steps.gate.outputs.export == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: issue-246-current-${{ github.run_id }}
          path: ${{ runner.temp }}/issue-246-current
          if-no-files-found: error
          retention-days: 7
