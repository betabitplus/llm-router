name: Issue 246 Apply Final Verified Boundary

on:
  pull_request:
    branches: [dev]
    types: [opened, reopened, synchronize]

permissions:
  contents: read

jobs:
  apply:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'feature/issue-246-standard-onboarding'
    runs-on: ubuntu-latest
    steps:
      - name: Create target write token
        id: target-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.PY_LIB_AUTOMATION_CLIENT_ID }}
          private-key: ${{ secrets.PY_LIB_AUTOMATION_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: llm-router
          permission-contents: write
          permission-workflows: write

      - name: Create shared read token
        id: shared-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.PY_LIB_AUTOMATION_CLIENT_ID }}
          private-key: ${{ secrets.PY_LIB_AUTOMATION_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            llm-router
            py-lib-starter
          permission-contents: read

      - uses: actions/checkout@v6
        with:
          ref: feature/issue-246-standard-onboarding
          fetch-depth: 0
          persist-credentials: false

      - name: Detect explicit apply commit
        id: gate
        shell: bash
        run: |
          if [ "$(git log -1 --pretty=%s)" = 'ci: finalize canonical Issue 246 layer contract' ]; then
            echo 'apply=true' >> "$GITHUB_OUTPUT"
          else
            echo 'apply=false' >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v6
        if: steps.gate.outputs.apply == 'true'
        with:
          python-version: '3.13'

      - uses: astral-sh/setup-uv@v8.2.0
        if: steps.gate.outputs.apply == 'true'
        with:
          enable-cache: auto

      - name: Install exact development environment and system tools
        if: steps.gate.outputs.apply == 'true'
        env:
          SHARED_PACKAGE_TOKEN: ${{ steps.shared-token.outputs.token }}
        shell: bash
        run: |
          set -euo pipefail
          auth_header="$(printf 'x-access-token:%s' "$SHARED_PACKAGE_TOKEN" | base64 | tr -d '\n')"
          printf '::add-mask::%s\n' "$auth_header"
          git config --global http.https://github.com/.extraheader "AUTHORIZATION: basic ${auth_header}"
          sudo apt-get update
          sudo apt-get install -y shellcheck
          sudo curl -fsSL -o /usr/local/bin/hadolint \
            https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64
          sudo chmod +x /usr/local/bin/hadolint
          bash scripts/env/setup.sh

      - name: Apply official Copier update to v0.29.4
        if: steps.gate.outputs.apply == 'true'
        shell: bash
        run: |
          set -euo pipefail
          out="$RUNNER_TEMP/issue246-final-apply"
          mkdir -p "$out"
          uv run py-lib-template-update --vcs-ref v0.29.4 \
            >"$out/template-update.log" 2>&1
          grep -Eq '^_commit: v0\.29\.4$' _copier_answers.yml
          grep -q 'py-lib-starter.git@v0.29.4#subdirectory=packages/py-lib-runtime' pyproject.toml
          grep -q 'py-lib-starter.git@v0.29.4#subdirectory=packages/py-lib-tooling' pyproject.toml
          uv lock --check

      - name: Apply verified canonical boundary transformation
        if: steps.gate.outputs.apply == 'true'
        shell: bash
        run: |
          set -euo pipefail
          awk '
            /^      - name: Apply original transformation and repair generated indentation$/ { step=1; next }
            step && /^        run: \|$/ { capture=1; next }
            capture && /^      - name:/ { exit }
            capture { sub(/^          /, ""); print }
          ' .github/workflows/project-issue-246-boundary-apply-v2.yml > /tmp/apply-v2.sh
          test -s /tmp/apply-v2.sh
          bash /tmp/apply-v2.sh
          python - <<'PY'
          from pathlib import Path

          replacements = {
              Path("src/llm_router/_internal/config/validation.py"): (
                  "from llm_router._internal.config.defaults import "
                  "_PROVIDERS_REQUIRING_BASE_URL",
                  "from llm_router._api.defaults import "
                  "_PROVIDERS_REQUIRING_BASE_URL",
              ),
              Path("tests/llm_router/unit/test_internal_route_expansion.py"): (
                  "from llm_router._internal.contracts.models import "
                  "ProviderLimits, RouterProfile",
                  "from llm_router._api.types import ProviderLimits, RouterProfile",
              ),
          }
          for path, (old, new) in replacements.items():
              text = path.read_text(encoding="utf-8")
              if text.count(old) != 1:
                  raise RuntimeError(f"expected one stale import in {path}")
              path.write_text(text.replace(old, new), encoding="utf-8")
          PY
          mapfile -t changed < <(git diff --name-only --diff-filter=ACMR -- '*.py')
          uv run ruff check --fix "${changed[@]}"
          uv run ruff format "${changed[@]}"

      - name: Align exhaustive private layer contract
        if: steps.gate.outputs.apply == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path("pyproject.toml")
          text = path.read_text(encoding="utf-8")
          old = '''layers = [ "runtime", "providers|session", "config:errors" ]
          ignore_imports = [ "llm_router._internal.config.** -> llm_router._internal.**" ]'''
          new = '''layers = [ "runtime:session", "providers", "config|capabilities" ]
          exhaustive = true'''
          if text.count(old) != 1:
              raise RuntimeError("expected one legacy private-layer contract")
          path.write_text(text.replace(old, new), encoding="utf-8")
          PY
          git diff --check

      - name: Converge commit hooks
        if: steps.gate.outputs.apply == 'true'
        shell: bash
        run: |
          set -euo pipefail
          out="$RUNNER_TEMP/issue246-final-apply"
          converged=false
          for pass in 1 2 3 4 5; do
            before="$(git diff --binary | sha256sum | cut -d' ' -f1)"
            set +e
            uv run pre-commit run --all-files --show-diff-on-failure \
              >"$out/pre-commit-${pass}.log" 2>&1
            rc=$?
            set -e
            if [ "$rc" -eq 0 ]; then
              converged=true
              break
            fi
            after="$(git diff --binary | sha256sum | cut -d' ' -f1)"
            if [ "$before" = "$after" ]; then
              cat "$out/pre-commit-${pass}.log"
              exit "$rc"
            fi
          done
          test "$converged" = true

      - name: Run strict checks, tests, and pre-push hooks
        if: steps.gate.outputs.apply == 'true'
        shell: bash
        run: |
          set -euo pipefail
          out="$RUNNER_TEMP/issue246-final-apply"
          python -m compileall -q src tests
          find . -type d -name __pycache__ -prune -exec rm -rf {} +
          uv run py-lib-template-check >"$out/template-check.log" 2>&1
          uv run py-lib-check-project-structure --strict-template >"$out/structure.log" 2>&1
          uv run py-lib-check-project-docs-structure >"$out/docs.log" 2>&1
          uv run py-lib-check-public-contract-boundary >"$out/public-contract.log" 2>&1
          uv run pytest tests/llm_router/unit tests/llm_router/integration tests/llm_router/property_based \
            -n auto -p randomly -m 'not slow' -q --no-cov >"$out/tests.log" 2>&1
          uv run pre-commit run --all-files --hook-stage pre-push --show-diff-on-failure \
            >"$out/pre-push.log" 2>&1
          git diff --check
          git status --short >"$out/git-status.txt"
          git diff --stat >"$out/git-diff-stat.txt"

      - name: Upload final apply evidence
        if: steps.gate.outputs.apply == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-246-final-apply-${{ github.run_id }}
          path: ${{ runner.temp }}/issue246-final-apply
          if-no-files-found: error
          retention-days: 14

      - name: Commit and push verified boundary and stable update
        if: steps.gate.outputs.apply == 'true'
        env:
          TARGET_TOKEN: ${{ steps.target-token.outputs.token }}
        shell: bash
        run: |
          set -euo pipefail
          git add -A
          git config user.name 'betabitplus-py-lib-automation[bot]'
          git config user.email '297150264+betabitplus-py-lib-automation[bot]@users.noreply.github.com'
          git commit -m 'refactor: restore canonical public declarations and starter v0.29.4'
          git config --global --unset-all http.https://github.com/.extraheader || true
          write_header="$(printf 'x-access-token:%s' "$TARGET_TOKEN" | base64 | tr -d '\n')"
          printf '::add-mask::%s\n' "$write_header"
          git -c http.https://github.com/.extraheader="AUTHORIZATION: basic ${write_header}" \
            push origin HEAD:feature/issue-246-standard-onboarding
