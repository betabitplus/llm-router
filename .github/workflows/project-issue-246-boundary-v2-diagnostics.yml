name: Issue 246 Hook Diagnostics

on:
  pull_request:
    branches: [dev]
    types: [opened, reopened, synchronize]

permissions:
  contents: read

jobs:
  diagnose:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'issue-246-standard-onboarding'
    runs-on: ubuntu-latest
    steps:
      - name: Create shared read token
        id: shared-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.PY_LIB_AUTOMATION_CLIENT_ID }}
          private-key: ${{ secrets.PY_LIB_AUTOMATION_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            llm-router
            py-lib-starter
          permission-contents: read

      - uses: actions/checkout@v6
        with:
          ref: issue-246-standard-onboarding
          fetch-depth: 0
          persist-credentials: false

      - name: Detect explicit diagnostic commit
        id: gate
        shell: bash
        run: |
          if [ "$(git log -1 --pretty=%s)" = 'ci: diagnose Issue 246 commit and pre-push hooks' ]; then
            echo 'run=true' >> "$GITHUB_OUTPUT"
          else
            echo 'run=false' >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v6
        if: steps.gate.outputs.run == 'true'
        with:
          python-version: '3.13'

      - uses: astral-sh/setup-uv@v8.2.0
        if: steps.gate.outputs.run == 'true'
        with:
          enable-cache: auto

      - name: Install exact development environment and system tools
        if: steps.gate.outputs.run == 'true'
        env:
          SHARED_PACKAGE_TOKEN: ${{ steps.shared-token.outputs.token }}
        shell: bash
        run: |
          set -euo pipefail
          auth_header="$(printf 'x-access-token:%s' "$SHARED_PACKAGE_TOKEN" | base64 | tr -d '\n')"
          printf '::add-mask::%s\n' "$auth_header"
          git config --global http.https://github.com/.extraheader "AUTHORIZATION: basic ${auth_header}"
          sudo apt-get update
          sudo apt-get install -y shellcheck
          sudo curl -fsSL -o /usr/local/bin/hadolint \
            https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64
          sudo chmod +x /usr/local/bin/hadolint
          bash scripts/env/setup.sh

      - name: Apply verified canonical boundary transformation
        if: steps.gate.outputs.run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          awk '
            /^      - name: Apply original transformation and repair generated indentation$/ { step=1; next }
            step && /^        run: \|$/ { capture=1; next }
            capture && /^      - name:/ { exit }
            capture { sub(/^          /, ""); print }
          ' .github/workflows/project-issue-246-boundary-apply-v2.yml > /tmp/apply-v2.sh
          test -s /tmp/apply-v2.sh
          bash /tmp/apply-v2.sh
          python - <<'PY'
          from pathlib import Path

          replacements = {
              Path("src/llm_router/_internal/config/validation.py"): (
                  "from llm_router._internal.config.defaults import "
                  "_PROVIDERS_REQUIRING_BASE_URL",
                  "from llm_router._api.defaults import "
                  "_PROVIDERS_REQUIRING_BASE_URL",
              ),
              Path("tests/llm_router/unit/test_internal_route_expansion.py"): (
                  "from llm_router._internal.contracts.models import "
                  "ProviderLimits, RouterProfile",
                  "from llm_router._api.types import ProviderLimits, RouterProfile",
              ),
          }
          for path, (old, new) in replacements.items():
              text = path.read_text(encoding="utf-8")
              if text.count(old) != 1:
                  raise RuntimeError(f"expected one stale import in {path}")
              path.write_text(text.replace(old, new), encoding="utf-8")
          PY
          mapfile -t changed < <(git diff --name-only --diff-filter=ACMR -- '*.py')
          uv run ruff check --fix "${changed[@]}"
          uv run ruff format "${changed[@]}"

      - name: Run hooks and preserve complete evidence
        if: steps.gate.outputs.run == 'true'
        id: checks
        shell: bash
        run: |
          set -uo pipefail
          out=issue246-hook-diagnostics
          mkdir -p "$out"
          failed=0
          check() {
            local name="$1"; shift
            set +e
            "$@" >"$out/${name}.log" 2>&1
            rc=$?
            set -e
            printf '%s=%s\n' "$name" "$rc" >>"$out/statuses.txt"
            if [ "$rc" -ne 0 ]; then failed=1; fi
          }
          check compile python -m compileall -q src tests
          find . -type d -name __pycache__ -prune -exec rm -rf {} +
          check structure uv run py-lib-check-project-structure --strict-template
          check docs uv run py-lib-check-project-docs-structure
          check public-contract uv run py-lib-check-public-contract-boundary
          check tests uv run pytest tests/llm_router/unit tests/llm_router/integration tests/llm_router/property_based -n auto -p randomly -m 'not slow' -q --no-cov
          export SKIP=check-branch-name,no-push-to-main,uv-sync-post-merge,uv-sync-post-checkout
          check pre-commit uv run pre-commit run --all-files --show-diff-on-failure
          check pre-push uv run pre-commit run --all-files --hook-stage pre-push --show-diff-on-failure
          unset SKIP
          check diff-check git diff --check
          git status --short >"$out/git-status.txt"
          git diff --stat >"$out/git-diff-stat.txt"
          git diff >"$out/git-diff.patch"
          cat "$out/statuses.txt"
          echo "failed=$failed" >>"$GITHUB_OUTPUT"
          exit 0

      - name: Upload hook diagnostics
        if: steps.gate.outputs.run == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-246-hooks-${{ github.run_id }}
          path: issue246-hook-diagnostics
          if-no-files-found: error
          retention-days: 14

      - name: Assert hooks
        if: steps.gate.outputs.run == 'true' && always()
        run: test '${{ steps.checks.outputs.failed }}' = '0'
