name: Issue 246 Validate No-op and Cleanup

on:
  pull_request:
    branches: [dev]
    types: [opened, reopened, synchronize]

permissions:
  contents: read

jobs:
  cleanup:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'feature/issue-246-standard-onboarding'
    runs-on: ubuntu-latest
    steps:
      - name: Create target write token
        id: target-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.PY_LIB_AUTOMATION_CLIENT_ID }}
          private-key: ${{ secrets.PY_LIB_AUTOMATION_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: llm-router
          permission-contents: write
          permission-workflows: write

      - name: Create shared read token
        id: shared-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.PY_LIB_AUTOMATION_CLIENT_ID }}
          private-key: ${{ secrets.PY_LIB_AUTOMATION_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            llm-router
            py-lib-starter
          permission-contents: read

      - uses: actions/checkout@v6
        with:
          ref: feature/issue-246-standard-onboarding
          fetch-depth: 0
          persist-credentials: false

      - name: Detect explicit cleanup request
        id: gate
        shell: bash
        run: |
          if [ "$(git log -1 --pretty=%s)" = 'ci: validate no-op and clean Issue 246 workflows' ]; then
            echo 'run=true' >> "$GITHUB_OUTPUT"
          else
            echo 'run=false' >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v6
        if: steps.gate.outputs.run == 'true'
        with:
          python-version: '3.13'

      - uses: astral-sh/setup-uv@v8.2.0
        if: steps.gate.outputs.run == 'true'
        with:
          enable-cache: auto

      - name: Install exact environment and hook tools
        if: steps.gate.outputs.run == 'true'
        env:
          SHARED_PACKAGE_TOKEN: ${{ steps.shared-token.outputs.token }}
        shell: bash
        run: |
          set -euo pipefail
          auth_header="$(printf 'x-access-token:%s' "$SHARED_PACKAGE_TOKEN" | base64 | tr -d '\n')"
          printf '::add-mask::%s\n' "$auth_header"
          git config --global http.https://github.com/.extraheader "AUTHORIZATION: basic ${auth_header}"
          sudo apt-get update
          sudo apt-get install -y shellcheck
          sudo curl -fsSL -o /usr/local/bin/hadolint \
            https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64
          sudo chmod +x /usr/local/bin/hadolint
          bash scripts/env/setup.sh
          uv lock --check

      - name: Prove same-version Copier update is a no-op
        if: steps.gate.outputs.run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          out="$RUNNER_TEMP/issue246-cleanup"
          mkdir -p "$out"
          git status --short >"$out/status-before-update.txt"
          test ! -s "$out/status-before-update.txt"
          uv run py-lib-template-update --vcs-ref v0.29.4 \
            >"$out/same-version-update.log" 2>&1
          git status --short >"$out/status-after-update.txt"
          git diff --exit-code
          test ! -s "$out/status-after-update.txt"
          uv run py-lib-template-check >"$out/template-check-before-cleanup.log" 2>&1

      - name: Remove every temporary Issue 246 workflow
        if: steps.gate.outputs.run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          out="$RUNNER_TEMP/issue246-cleanup"
          find .github/workflows -maxdepth 1 -type f \
            -name 'project-issue-246-*.yml' -print | sort \
            >"$out/deleted-workflows.txt"
          test -s "$out/deleted-workflows.txt"
          while IFS= read -r path; do
            rm -f "$path"
          done <"$out/deleted-workflows.txt"
          test -z "$(find .github/workflows -maxdepth 1 -type f -name 'project-issue-246-*.yml' -print -quit)"
          git diff --check

      - name: Converge commit hooks
        if: steps.gate.outputs.run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          out="$RUNNER_TEMP/issue246-cleanup"
          converged=false
          for pass in 1 2 3 4 5; do
            before="$(git diff --binary | sha256sum | cut -d' ' -f1)"
            set +e
            uv run pre-commit run --all-files --show-diff-on-failure \
              >"$out/pre-commit-${pass}.log" 2>&1
            rc=$?
            set -e
            if [ "$rc" -eq 0 ]; then
              converged=true
              break
            fi
            after="$(git diff --binary | sha256sum | cut -d' ' -f1)"
            if [ "$before" = "$after" ]; then
              cat "$out/pre-commit-${pass}.log"
              exit "$rc"
            fi
          done
          test "$converged" = true

      - name: Create local cleanup commit
        if: steps.gate.outputs.run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git add -A
          git config user.name 'betabitplus-py-lib-automation[bot]'
          git config user.email '297150264+betabitplus-py-lib-automation[bot]@users.noreply.github.com'
          git commit -m 'chore: remove Issue 246 migration workflows'

      - name: Validate committed cleanup tree
        if: steps.gate.outputs.run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          out="$RUNNER_TEMP/issue246-cleanup"
          uv run py-lib-template-check >"$out/template-check.log" 2>&1
          uv run py-lib-check-project-structure --strict-template >"$out/structure.log" 2>&1
          uv run py-lib-check-project-docs-structure >"$out/docs.log" 2>&1
          uv run py-lib-check-public-contract-boundary >"$out/public-contract.log" 2>&1
          uv run pytest tests/llm_router/unit tests/llm_router/integration tests/llm_router/property_based \
            -n auto -p randomly -m 'not slow' -q --no-cov >"$out/tests.log" 2>&1
          uv run pre-commit run --all-files --hook-stage pre-push --show-diff-on-failure \
            >"$out/pre-push.log" 2>&1
          git diff --exit-code
          git status --short >"$out/final-status.txt"
          test ! -s "$out/final-status.txt"
          git show --stat --oneline HEAD >"$out/cleanup-commit.txt"

      - name: Upload cleanup evidence
        if: steps.gate.outputs.run == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-246-cleanup-${{ github.run_id }}
          path: ${{ runner.temp }}/issue246-cleanup
          if-no-files-found: error
          retention-days: 14

      - name: Push verified cleanup commit
        if: steps.gate.outputs.run == 'true'
        env:
          TARGET_TOKEN: ${{ steps.target-token.outputs.token }}
        shell: bash
        run: |
          set -euo pipefail
          git config --global --unset-all http.https://github.com/.extraheader || true
          write_header="$(printf 'x-access-token:%s' "$TARGET_TOKEN" | base64 | tr -d '\n')"
          printf '::add-mask::%s\n' "$write_header"
          git -c http.https://github.com/.extraheader="AUTHORIZATION: basic ${write_header}" \
            push origin HEAD:feature/issue-246-standard-onboarding
