name: Issue 246 Promote Generated Tree

on:
  push:
    branches:
      - issue-246-standard-onboarding

concurrency:
  group: issue-246-standard-onboarding-promotion
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Check out working branch
        uses: actions/checkout@v6
        with:
          ref: issue-246-standard-onboarding
          fetch-depth: 0

      - name: Cherry-pick verified generated commits
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin \
            '+refs/heads/issue-246-standard-onboarding:refs/remotes/origin/issue-246-standard-onboarding' \
            '+refs/heads/issue-246-generated-tree:refs/remotes/origin/issue-246-generated-tree' \
            --force
          git config user.name 'betabitplus-py-lib-automation[bot]'
          git config user.email '297150264+betabitplus-py-lib-automation[bot]@users.noreply.github.com'
          mapfile -t commits < <(
            git rev-list --reverse \
              origin/issue-246-standard-onboarding..origin/issue-246-generated-tree
          )
          test "${#commits[@]}" -eq 3
          git cherry-pick "${commits[@]}"
          test ! -e .issue246
          git diff --check
          git push origin HEAD:issue-246-standard-onboarding
