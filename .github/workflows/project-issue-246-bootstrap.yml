name: Issue 246 Apply Canonical Workflows

on:
  push:
    branches:
      - issue-246-standard-onboarding

concurrency:
  group: issue-246-apply-canonical-workflows
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out working branch with migration PAT
        uses: actions/checkout@v6
        with:
          ref: issue-246-standard-onboarding
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: auto

      - name: Generate immutable canonical standard reference
        shell: bash
        run: |
          set -euo pipefail
          reference="$RUNNER_TEMP/llm-router-python-lib-standard-v0.29.1"
          rm -rf "$reference"
          uvx --from copier==9.16.0 copier copy \
            https://github.com/betabitplus/py-lib-starter.git \
            "$reference" \
            --vcs-ref v0.29.1 \
            --trust \
            --defaults \
            --data-file _copier_answers.yml
          grep -Fx '_commit: v0.29.1' "$reference/_copier_answers.yml"
          grep -Fx '_src_path: https://github.com/betabitplus/py-lib-starter.git' \
            "$reference/_copier_answers.yml"
          printf '%s\n' "$reference" > "$RUNNER_TEMP/issue246-reference-path"

      - name: Replace legacy workflows with canonical workflows
        shell: bash
        run: |
          set -euo pipefail
          reference="$(cat "$RUNNER_TEMP/issue246-reference-path")"
          rm -rf .github/workflows
          mkdir -p .github/workflows
          cp -a "$reference/.github/workflows/." .github/workflows/
          git diff --check
          test "$(find .github/workflows -maxdepth 1 -type f | wc -l)" -eq 7
          sha256sum .github/workflows/*

      - name: Commit and push canonical workflows
        shell: bash
        run: |
          set -euo pipefail
          git config user.name betabitplus
          git config user.email 8123085+betabitplus@users.noreply.github.com
          git add -A .github/workflows
          git commit -m 'ci: adopt canonical standard workflows'
          git push origin HEAD:issue-246-standard-onboarding
