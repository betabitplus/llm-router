name: Issue 246 Bootstrap

on:
  push:
    branches:
      - issue-246-standard-onboarding

permissions:
  contents: write

jobs:
  apply-migration:
    runs-on: ubuntu-latest
    steps:
      - name: Check out migration branch
        uses: actions/checkout@v6
        with:
          ref: issue-246-standard-onboarding
          fetch-depth: 0

      - name: Detect explicit migration trigger
        id: trigger
        shell: bash
        run: |
          if [ -f .issue246/READY ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify released baseline and create safety tag
        if: steps.trigger.outputs.ready == 'true'
        shell: bash
        run: |
          set -euo pipefail
          expected=c6a1d737b7874d7578e1ab127d336b2dd999d12a
          tag=pre-standard-onboarding-20260705
          git fetch origin \
            '+refs/heads/dev:refs/remotes/origin/dev' \
            '+refs/heads/main:refs/remotes/origin/main' \
            '+refs/tags/*:refs/tags/*' \
            --force
          test "$(git rev-parse refs/remotes/origin/dev)" = "$expected"
          test "$(git rev-parse refs/remotes/origin/main)" = "$expected"
          test "$(git rev-parse refs/tags/v0.8.1^{commit})" = "$expected"
          git config user.name 'betabitplus-py-lib-automation[bot]'
          git config user.email '297150264+betabitplus-py-lib-automation[bot]@users.noreply.github.com'
          if git rev-parse "refs/tags/$tag" >/dev/null 2>&1; then
            test "$(git rev-parse "refs/tags/$tag^{commit}")" = "$expected"
          else
            git tag -a "$tag" "$expected" \
              -m 'Safety baseline before Issue #246 standard onboarding'
            git push origin "refs/tags/$tag"
          fi

      - name: Set up uv
        if: steps.trigger.outputs.ready == 'true'
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: auto

      - name: Generate immutable canonical standard reference
        if: steps.trigger.outputs.ready == 'true'
        shell: bash
        run: |
          set -euo pipefail
          reference="$RUNNER_TEMP/llm-router-python-lib-standard-v0.29.1"
          rm -rf "$reference"
          uvx --from copier==9.16.0 copier copy \
            https://github.com/betabitplus/py-lib-starter.git \
            "$reference" \
            --vcs-ref v0.29.1 \
            --trust \
            --defaults \
            --data-file _copier_answers.yml
          grep -Fx '_commit: v0.29.1' "$reference/_copier_answers.yml"
          grep -Fx '_src_path: https://github.com/betabitplus/py-lib-starter.git' \
            "$reference/_copier_answers.yml"
          printf '%s\n' "$reference" > "$RUNNER_TEMP/issue246-reference-path"

      - name: Apply standard shell and shared runtime migration
        if: steps.trigger.outputs.ready == 'true'
        shell: bash
        run: |
          set -euo pipefail
          reference="$(cat "$RUNNER_TEMP/issue246-reference-path")"
          python .issue246/migrate.py . "$reference"
          find . -type d -name __pycache__ -prune -exec rm -rf {} +
          git diff --check
          git add -A
          git commit -m 'chore: adopt standard repository shell and shared runtime'

      - name: Refresh immutable dependency lock
        if: steps.trigger.outputs.ready == 'true'
        shell: bash
        run: |
          set -euo pipefail
          uv lock
          uv lock --check
          git add uv.lock
          if ! git diff --cached --quiet; then
            git commit -m 'chore: refresh immutable dependency lock'
          fi

      - name: Verify basic migrated source integrity
        if: steps.trigger.outputs.ready == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python -m compileall -q src tests workbench examples
          test ! -e src/llm_router/_support
          test ! -e tests/support
          ! grep -R --line-number \
            -E 'llm_router\._support|tests\.support|(^|[[:space:]])import structlog|from structlog' \
            src tests workbench examples
          grep -R --line-number 'from py_lib_runtime import' src/llm_router
          grep -R --line-number 'from py_lib_tooling import' tests workbench
          git diff --check

      - name: Remove migration-only resources and push
        if: steps.trigger.outputs.ready == 'true'
        shell: bash
        run: |
          set -euo pipefail
          find . -type d -name __pycache__ -prune -exec rm -rf {} +
          rm -rf .issue246
          rm -f .github/workflows/project-issue-246-bootstrap.yml
          git add -A
          git commit -m 'chore: remove Issue 246 migration bootstrap'
          git push origin HEAD:issue-246-standard-onboarding
