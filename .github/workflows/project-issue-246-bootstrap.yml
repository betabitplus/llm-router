name: Issue 246 Bootstrap

on:
  push:
    branches:
      - issue-246-standard-onboarding

permissions:
  contents: write

jobs:
  export-baseline:
    runs-on: ubuntu-latest
    steps:
      - name: Check out complete repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify protected baseline refs
        shell: bash
        run: |
          set -euo pipefail
          expected=c6a1d737b7874d7578e1ab127d336b2dd999d12a
          git fetch origin dev main --tags --force
          test "$(git rev-parse origin/dev)" = "$expected"
          test "$(git rev-parse origin/main)" = "$expected"
          test "$(git rev-parse refs/tags/v0.8.1^{commit})" = "$expected"

      - name: Create immutable safety tag
        shell: bash
        run: |
          set -euo pipefail
          tag=pre-standard-onboarding-20260705
          expected=c6a1d737b7874d7578e1ab127d336b2dd999d12a
          if git rev-parse "refs/tags/$tag" >/dev/null 2>&1; then
            test "$(git rev-parse "refs/tags/$tag^{commit}")" = "$expected"
          else
            git tag -a "$tag" "$expected" -m "Safety baseline before Issue #246 standard onboarding"
            git push origin "refs/tags/$tag"
          fi

      - name: Create recoverable source and Git bundle backups
        shell: bash
        run: |
          set -euo pipefail
          git bundle create llm-router-pre-standard-onboarding-20260705.bundle --all
          tar --exclude=.git --exclude=llm-router-pre-standard-onboarding-20260705.bundle \
            -czf llm-router-source-c6a1d737.tar.gz .
          sha256sum llm-router-pre-standard-onboarding-20260705.bundle \
            llm-router-source-c6a1d737.tar.gz > SHA256SUMS

      - name: Upload baseline backup
        uses: actions/upload-artifact@v4
        with:
          name: issue-246-baseline-backup
          path: |
            llm-router-pre-standard-onboarding-20260705.bundle
            llm-router-source-c6a1d737.tar.gz
            SHA256SUMS
          if-no-files-found: error
          retention-days: 90
