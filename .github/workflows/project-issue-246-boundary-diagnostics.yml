name: Issue 246 Boundary Diagnostics

on:
  pull_request:
    branches: [dev]
    types: [opened, reopened, synchronize]

permissions:
  contents: read

jobs:
  diagnose:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'issue-246-standard-onboarding'
    runs-on: ubuntu-latest
    steps:
      - name: Create shared read token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.PY_LIB_AUTOMATION_CLIENT_ID }}
          private-key: ${{ secrets.PY_LIB_AUTOMATION_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            llm-router
            py-lib-starter
          permission-contents: read

      - uses: actions/checkout@v6
        with:
          ref: issue-246-standard-onboarding
          fetch-depth: 0
          persist-credentials: false

      - name: Detect diagnostic commit
        id: gate
        shell: bash
        run: |
          if [ "$(git log -1 --pretty=%s)" = 'ci: diagnose canonical Issue 246 boundary' ]; then
            echo 'run=true' >> "$GITHUB_OUTPUT"
          else
            echo 'run=false' >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v6
        if: steps.gate.outputs.run == 'true'
        with:
          python-version: '3.13'

      - uses: astral-sh/setup-uv@v8.2.0
        if: steps.gate.outputs.run == 'true'
        with:
          enable-cache: auto

      - name: Install exact development environment
        if: steps.gate.outputs.run == 'true'
        env:
          SHARED_PACKAGE_TOKEN: ${{ steps.app-token.outputs.token }}
        shell: bash
        run: |
          set -euo pipefail
          auth_header="$(printf 'x-access-token:%s' "$SHARED_PACKAGE_TOKEN" | base64 | tr -d '\n')"
          printf '::add-mask::%s\n' "$auth_header"
          git config --global http.https://github.com/.extraheader "AUTHORIZATION: basic ${auth_header}"
          bash scripts/env/setup.sh

      - name: Extract and apply the exact proposed transformation
        if: steps.gate.outputs.run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          awk '
            /python - <<'"'"'PY'"'"'/ { capture=1; next }
            capture && /^          PY$/ { exit }
            capture { sub(/^          /, ""); print }
          ' .github/workflows/project-issue-246-apply-refactor-v2.yml > /tmp/issue246-transform.py
          python /tmp/issue246-transform.py

      - name: Run checks and preserve evidence
        if: steps.gate.outputs.run == 'true'
        id: checks
        shell: bash
        run: |
          set -uo pipefail
          out=issue246-boundary-diagnostics
          mkdir -p "$out"
          failed=0
          check() {
            local name="$1"; shift
            set +e
            "$@" >"$out/${name}.log" 2>&1
            rc=$?
            set -e
            printf '%s=%s\n' "$name" "$rc" >>"$out/statuses.txt"
            if [ "$rc" -ne 0 ]; then failed=1; fi
          }
          check ruff-fix uv run ruff check --fix src tests
          check ruff-format uv run ruff format src tests
          check compile python -m compileall -q src tests
          find . -type d -name __pycache__ -prune -exec rm -rf {} +
          check structure uv run py-lib-check-project-structure --strict-template
          check docs uv run py-lib-check-project-docs-structure
          check public-contract uv run py-lib-check-public-contract-boundary
          check tests uv run pytest tests/llm_router/unit tests/llm_router/integration tests/llm_router/property_based -n auto -p randomly -m 'not slow' -q --no-cov
          check diff-check git diff --check
          git status --short >"$out/git-status.txt"
          git diff --stat >"$out/git-diff-stat.txt"
          git diff >"$out/git-diff.patch"
          cat "$out/statuses.txt"
          echo "failed=$failed" >>"$GITHUB_OUTPUT"
          exit 0

      - name: Upload boundary diagnostics
        if: steps.gate.outputs.run == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-246-boundary-${{ github.run_id }}
          path: issue246-boundary-diagnostics
          if-no-files-found: error
          retention-days: 14

      - name: Assert boundary checks
        if: steps.gate.outputs.run == 'true' && always()
        run: test '${{ steps.checks.outputs.failed }}' = '0'
