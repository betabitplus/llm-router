name: Setup Dev Env
description: Set up Python, uv, and project dev dependencies.

inputs:
  python-version:
    description: Python version to install
    required: false
    default: "3.13"

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Set up uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Install dependencies (dev)
      shell: bash
      run: uv sync --group dev --frozen
