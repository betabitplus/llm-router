# Typos configuration
# See: https://github.com/crate-ci/typos

[files]
# Exclude VCR cassettes - they contain recorded API responses that may have
# truncated words or technical terms that trigger false positives
extend-exclude = ["cassettes"]

[default.extend-words]
# Real Python package names that look like typos
astroid = "astroid"
# Async send helper name
asend = "asend"
# Reddit Geo Filters
ND = "ND"
US_ND = "US_ND"
